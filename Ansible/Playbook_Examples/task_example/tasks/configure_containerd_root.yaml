---
- name: Stop containerd before changing root
  systemd_service:
    name: containerd
    state: stopped
  failed_when: false

- name: Create containerd root directory
  file:
    path: "{{ containerd_root }}"
    state: directory
    owner: root
    group: root
    mode: "0711"

- name: Create containerd state directory
  file:
    path: "{{ containerd_state }}"
    state: directory
    owner: root
    group: root
    mode: "0711"

- name: Create containerd config directory
  file:
    path: /etc/containerd
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Generate default containerd config when missing
  shell: |
    containerd config default > /etc/containerd/config.toml
  args:
    executable: /bin/bash
    creates: /etc/containerd/config.toml

- name: Configure containerd root path
  replace:
    path: /etc/containerd/config.toml
    regexp: '^root = .*$'
    replace: 'root = "{{ containerd_root }}"'

- name: Configure containerd state path
  replace:
    path: /etc/containerd/config.toml
    regexp: '^state = .*$'
    replace: 'state = "{{ containerd_state }}"'

- name: Reload systemd daemon
  systemd_service:
    daemon_reload: true

- name: Start and enable containerd
  systemd_service:
    name: containerd
    enabled: true
    state: restarted

- name: Start and enable Docker
  systemd_service:
    name: docker
    enabled: true
    state: restarted
