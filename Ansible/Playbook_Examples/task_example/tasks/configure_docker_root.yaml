---
- name: Stop Docker before changing data-root
  systemd_service:
    name: docker
    state: stopped
  failed_when: false

- name: Create Docker data-root directory
  file:
    path: "{{ docker_data_root }}"
    state: directory
    owner: root
    group: root
    mode: "0711"

- name: Create Docker config directory
  file:
    path: /etc/docker
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Configure Docker daemon data-root
  template:
    src: daemon.json.j2
    dest: /etc/docker/daemon.json
    owner: root
    group: root
    mode: "0644"

